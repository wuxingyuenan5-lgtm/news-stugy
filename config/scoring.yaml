version: "0.2"

# 第一阶段不使用0至100分模型，只保留高、中、低三级人工判断。

importance:
  high:
    report_usage: daily_core
    guidance:
      - 重大政策、核心经济数据或公司公告
      - 对多个市场或当前重点主题有明显影响
      - 相比此前出现明确新增信息
      - 未来数日仍需要持续跟踪
  medium:
    report_usage: market_brief
    guidance:
      - 对单一市场或行业有参考价值
      - 可补充重要事件背景
      - 高质量机构研究或非共识线索
  low:
    report_usage: archive_or_ignore
    guidance:
      - 信息重复或缺乏新增事实
      - 只有泛泛观点，没有可靠证据
      - 与当前覆盖范围关系较弱
      - 短期噪音或事后归因

hard_rules:
  - 无原始来源或可靠出处的事实不得进入报告重点部分
  - 同一内容被多家媒体转载时优先保留原始来源或质量最高的报道
  - 已经写过且没有新增进展的信息不重复进入日报
  - 社交媒体内容原则上只能作为线索，重要事实需要进一步验证
  - 重大官方数据、政策和公告必须进入人工审核

human_review:
  required: true
  notes: 最终是否进入报告由人工决定，不要求记录复杂覆盖理由。
